# ╔═══════════════════════════════════════════════════════════════╗
# ║  Testor — Orienteering Simulation Platform                    ║
# ║                                                               ║
# ║  Mode SQLite : docker compose up -d --build                   ║
# ║  Mode MySQL  : docker compose --profile mysql up -d --build   ║
# ║                                                               ║
# ║  Config dans .env.docker (DB_PROVIDER=sqlite ou mysql)        ║
# ╚═══════════════════════════════════════════════════════════════╝

services:
  # ── Application (frontend + API) ──────────────────────────────
  app:
    build: .
    container_name: testor-app
    restart: unless-stopped
    ports:
      - "80:8787"
    env_file: .env.docker
    volumes:
      - app_data:/app/server/data
    depends_on:
      mysql:
        condition: service_healthy
        required: false

  # ── MySQL ─────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: testor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orienteering
      MYSQL_USER: orienteering
      MYSQL_PASSWORD: orienteering
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    profiles:
      - mysql

  # ── phpMyAdmin ────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: testor-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: orienteering
      PMA_PASSWORD: orienteering
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - mysql

volumes:
  app_data:
  mysql_data:
