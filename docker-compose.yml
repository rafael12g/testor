services:
  mysql:
    image: mysql:8.4
    container_name: testor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orienteering
      MYSQL_USER: orienteering
      MYSQL_PASSWORD: orienteering
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: testor-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: orienteering
      PMA_PASSWORD: orienteering
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  mysql_data:
